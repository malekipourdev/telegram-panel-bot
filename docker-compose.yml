version: "3.8"

services:
  telegram-bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: telegram-sanayi-bot
    ports:
      - "8000:8000"
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - SANAYI_API_BASE_URL=${SANAYI_API_BASE_URL:-https://api.sanayi.panel}
      - SANAYI_API_KEY=${SANAYI_API_KEY}
      - SANAYI_API_SECRET=${SANAYI_API_SECRET}
      - API_HOST=0.0.0.0
      - API_PORT=8000
    volumes:
      - ./:/app
    restart: unless-stopped
    networks:
      - telegram-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  telegram-network:
    driver: bridge
